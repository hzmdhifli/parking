  days:[
    {label:"Day 1",title:"Push",muscles:{
      Chest:["Barbell Bench Press","Incline Dumbbell Bench Press","Standing Cable Fly","Dumbbell Fly"],
      Shoulders:["Overhead Press","Dumbbell Lateral Raise","Arnold Dumbbell Press","Landmine Press"],
      Triceps:["Close-grip Bench Press","Skull Crusher","Cable Push Down","Cable Overhead Tricep Extension"]}},
    {label:"Day 2",title:"Pull",muscles:{
      Back:["Conventional Deadlift","Romanian Deadlift","Trap-bar Deadlift","Barbell Bent-over Row"],
      Biceps:["EZ Bar Curl","Dumbbell Hammer Curl","Incline Dumbbell Curl","Cable Curl"]}},
    {label:"Day 3",title:"Legs",muscles:{
      Quads:["Back Squat","Front Squat","Leg Press","Leg Extension"],
      Hamstrings:["Romanian Deadlift","Leg Curl","Seated Leg Curl","Glute-Ham Raise"],
      Calves:["Standing Calf Raise","Seated Calf Raise","Barbell Standing Calf Raise","Bodyweight Calf Raise"]}},
    {label:"Day 4",title:"Rest",rest:true},
    {label:"Day 5",title:"Push",muscles:{
      Chest:["Barbell Bench Press","Incline Dumbbell Bench Press","Incline Cable Fly","Dumbbell Squeeze Press"],
      Shoulders:["Overhead Press","Lateral Raise Machine","Seated Dumbbell Shoulder Press","Face Pull"],
      Triceps:["Close-grip Bench Press","Cable Overhead Tricep Extension","Tricep Extension Machine","Bench Dips"]}},
    {label:"Day 6",title:"Pull",muscles:{
      Back:["Conventional Deadlift","Paused Deadlift","Romanian Deadlift","Cable Pull Through"],
      Biceps:["Barbell Preacher Curl","EZ Bar Preacher Curl","Cable Hammer Curl","Arm Curl Machine"]}},
    {label:"Day 7",title:"Legs",muscles:{
      Quads:["Paused Back Squat","Hack Squat Machine","V Squat","Single Leg Leg Press"],
      Hamstrings:["Stiff Leg Deadlift","Dumbbell Romanian Deadlift","Dumbbell Leg Curl","Glute-Ham Raise"],
      Calves:["Standing Calf Raise","Seated Calf Raise","Seated Calf Raise","Bodyweight Calf Raise"]}}
  ]
}
];

let active=programs[0].id;

function renderNav(){
  document.getElementById("nav").innerHTML=programs.map(p=>
    `<button class="anav${p.id===active?' active':''}" onclick="go('${p.id}')">${p.name.split(' ')[0]} ${p.name.split(' ').slice(-1)[0]}</button>`
  ).join("");
}

function go(id){active=id;renderNav();renderContent()}

function renderContent(){
  const p=programs.find(x=>x.id===active);
  let h=`<div class="athlete-header">
    <div class="avatar" style="background:${p.color};color:${p.textColor}">${p.initials}</div>
    <div><div class="athlete-name">${p.name}</div><div class="athlete-meta">${p.split}</div></div>
  </div>
  <div class="note-box">${p.note}</div>
  <div class="week-grid">`;

  p.days.forEach(d=>{
    if(d.rest){
      h+=`<div class="day-card day-rest"><div class="day-header"><span class="day-num">${d.label}</span><span class="day-title">Rest</span></div></div>`;
    } else {
      h+=`<div class="day-card"><div class="day-header" style="background:var(--color-background-secondary)"><span class="day-num" style="color:var(--color-text-tertiary)">${d.label}</span><span class="day-title" style="color:var(--color-text-primary)">${d.title}</span></div><div class="muscles-list">`;
      Object.entries(d.muscles).forEach(([muscle,exs])=>{
        const c=mc(muscle);
        h+=`<div class="muscle-group"><span class="muscle-tag" style="background:${c.bg};color:${c.text}">${muscle}</span>`;
        exs.forEach(e=>{ h+=`<div class="ex-item">${e}</div>`; });
        h+=`</div>`;
      });
      h+=`</div></div>`;
    }
  });

  h+=`</div><button class="export-btn" onclick="exp()">Export this program ↗</button>`;
  document.getElementById("content").innerHTML=h;
}

function exp(){
  const p=programs.find(x=>x.id===active);
  let lines=[`${p.name} — ${p.split}\n`];
  p.days.forEach(d=>{
    if(d.rest){lines.push(`${d.label}: Rest`)}
    else{
      lines.push(`${d.label}: ${d.title}`);
      Object.entries(d.muscles).forEach(([m,exs])=>{
        lines.push(`  ${m}:`);
        exs.forEach((e,i)=>lines.push(`    ${i+1}. ${e}`));
      });
    }
  });
  sendPrompt(lines.join("\n"));
}

renderNav();renderContent();
</script>
